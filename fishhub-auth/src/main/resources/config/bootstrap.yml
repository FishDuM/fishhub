spring:
  application:
    name: fishhub-auth # 应用名称
  profiles:
    active: dev # 默认激活 dev 本地开发环境
  cloud:
    nacos:
      config:
        prefix: ${spring.application.name} # 配置 Data Id 前缀，这里使用应用名称作为前缀
        group: DEFAULT_GROUP # 所属组
        namespace: 0851c2f8-7f2d-4d86-859e-40123550347e # 命名空间 ID
        file-extension: yaml # 配置文件格式
        refresh-enabled: true # 是否开启动态刷新
        server-addr: 127.0.0.1:8848
      discovery:
        enabled: true # 启用服务发现
        group: DEFAULT_GROUP # 所属组
        namespace: 0851c2f8-7f2d-4d86-859e-40123550347e
        server-addr: 127.0.0.1:8848 # 指定 Nacos 配置中心的服务器地址